<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNVEIL — Pilih Kursi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="mainmenu.html" class="back-btn">&#8592; Kembali</a>
  <a class="topbar-logo">
    <img src="img/Unveil.png">
  </a>
  <div class="topbar-right">15 April 2026 · 12:00 WIB</div>
</div>




<!-- WRAPPER -->
<div class="page-wrap">

  <!-- SHOW INFO CARD -->
  <div class="show-info-bar">
    <div class="show-info-item"><span class="sib-label">Tempat</span><span class="sib-val">Aula SMA Atisa Dipamkara · Lt. 3</span></div>
    <div class="sib-divider"></div>
    <div class="show-info-item"><span class="sib-label">Durasi</span><span class="sib-val">~120 menit</span></div>
    <div class="sib-divider"></div>
    <div class="show-info-item"><span class="sib-label">Harga</span><span class="sib-val gold">VIP = Rp 45.000 / kursi</span><span class="sib-val gold">Reg = Rp 40.000 / kursi</span></div>
  </div>

  <!-- STAGE -->
  <div class="stage-wrap">
    <div class="stage-lights">
      <div class="lc"></div><div class="lc"></div><div class="lc"></div>
      <div class="lc"></div><div class="lc"></div><div class="lc"></div>
    </div>
    <div class="stage">— PANGGUNG —</div>
  </div>

  <!-- GURU -->
  <div class="guru">Kursi Guru</div>
  <div class="labelvip">VIP</div>

  <!-- SEATS -->
  <div id="seatContainer" class="seats"></div>

  

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="ld ld-avail"></div><span>Tersedia</span></div>
    <div class="legend-item"><div class="ld ld-sel"></div><span>Dipilih</span></div>
    <div class="legend-item"><div class="ld ld-locked"></div><span>Dikunci sementara</span></div>
    <div class="legend-item"><div class="ld ld-booked"></div><span>Terisi</span></div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <p id="info" class="info-text">Belum ada kursi dipilih</p>
    <button id="bookBtn">Lanjut Pesan</button>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
